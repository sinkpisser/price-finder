<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Finder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#111;color:#eee;max-width:640px;margin:0 auto;padding:1rem;min-height:100vh}
h1{font-size:16px;font-weight:600;margin-bottom:1rem;color:#fff}
input[type="password"],input[type="text"]{width:100%;padding:10px;background:#1e1e1e;border:1px solid #333;border-radius:6px;color:#eee;font-size:14px}
input:focus{outline:none;border-color:#555}
.btn{display:block;width:100%;padding:12px;background:#1e1e1e;border:1px solid #444;border-radius:6px;color:#eee;font-size:14px;cursor:pointer;text-align:center;margin-top:8px;min-height:44px}
.btn:hover:not(:disabled){background:#2a2a2a;border-color:#666}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn.primary{background:#1a3a5c;border-color:#2a5a8c;color:#8cc8ff}
.btn.primary:hover:not(:disabled){background:#1e4570}
.btn.sm{padding:7px 12px;width:auto;display:inline-block;font-size:12px;min-height:36px;margin-top:0}
.btn.danger{background:#2a1010;border-color:#5a2020;color:#f08080;width:auto}
.btn.success{background:#0a2a1a;border-color:#1a6a3a;color:#4aca8a;width:auto}
#upload-area{border:1px dashed #444;border-radius:8px;padding:2.5rem 1rem;text-align:center;cursor:pointer;background:#181818;transition:border-color 0.15s}
#upload-area:hover{border-color:#666}
#upload-area svg{display:block;margin:0 auto 8px}
#upload-area p{font-size:13px;color:#888;margin-top:4px}
.label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#666;margin:1.1rem 0 5px}
.box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:10px 12px;font-size:13px;line-height:1.65;color:#ccc}
.prices-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.price-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:10px 12px}
.price-box-label{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#666;margin-bottom:4px}
.price-val{font-size:18px;font-weight:700;color:#8cc8ff}
.resale-num{font-size:20px;font-weight:700;color:#8cc8ff}
.none{font-size:12px;color:#555;padding:3px 0}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #444;border-top-color:#888;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.key-row{display:flex;gap:8px;align-items:center}
.key-row input{flex:1}
.key-status{font-size:11px;color:#666;margin-top:4px}
.key-status.ok{color:#4a9}
#key-section{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #222}
.item-card{background:#181818;border:1px solid #2a2a2a;border-radius:8px;margin-bottom:10px;overflow:hidden}
.card-top{display:flex;gap:12px;padding:12px;align-items:flex-start}
.card-thumb{width:72px;height:72px;object-fit:cover;border-radius:5px;flex-shrink:0;background:#222}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:3px;line-height:1.3}
.card-desc{font-size:12px;color:#888;line-height:1.5}
.card-body{padding:0 12px 12px}
.flag{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;background:#2a1f0a;border:1px solid #6b4c1a;border-radius:4px;color:#d4900a;font-size:11px;font-weight:600;margin:4px 0 8px}
.link-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;margin-bottom:2px}
.link-btn{display:inline-block;padding:5px 11px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#5a9fd4;font-size:12px;text-decoration:none}
.link-btn:hover{background:#222;border-color:#555}
.err-inline{font-size:12px;color:#f08080;padding:6px 0}
.extra-imgs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.extra-thumb{width:52px;height:52px;object-fit:cover;border-radius:4px;border:1px solid #333}
.reid-section{background:#1a1a0f;border:1px solid #3a3010;border-radius:6px;padding:10px;margin-bottom:8px}
.reid-section .label{margin-top:0}
#batch-bar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.queue-badge{font-size:11px;color:#666}
</style>
</head>
<body>

<h1>Price Finder</h1>

<div id="key-section">
  <div class="label">Anthropic API Key</div>
  <div class="key-row">
    <input type="password" id="api-key" placeholder="sk-ant-...">
    <button class="btn sm" onclick="saveKey()">Save</button>
  </div>
  <p class="key-status" id="key-status">No key saved.</p>
</div>

<div id="upload-section">
  <div id="upload-area" onclick="document.getElementById('fi').click()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
    </svg>
    <p>Select up to 20 images</p>
    <p style="font-size:11px;margin-top:4px;color:#555">JPEG · PNG · WebP · GIF</p>
  </div>
  <p style="font-size:12px;color:#666;margin-top:10px;line-height:1.5;">&#128161; <strong style="color:#888">Tip:</strong> Know the brand, model, or markings? Note them before uploading — you can add keywords per item after identification.</p>
  <input type="file" id="fi" accept="image/jpeg,image/png,image/webp,image/gif" multiple style="display:none" onchange="handleFiles(event)">
</div>

<div id="queue-section" style="display:none">
  <div id="batch-bar">
    <button class="btn danger sm" onclick="resetAll()">&#8635; Clear All</button>
    <button class="btn sm" onclick="document.getElementById('fi-more').click()">+ Add More</button>
    <input type="file" id="fi-more" accept="image/jpeg,image/png,image/webp,image/gif" multiple style="display:none" onchange="handleFiles(event)">
    <span class="queue-badge" id="queue-badge"></span>
  </div>
  <div id="queue"></div>
</div>

<script>
const VALID = ['image/jpeg','image/png','image/webp','image/gif'];
const HAIKU  = 'claude-haiku-4-5-20251001';
const SONNET = 'claude-sonnet-4-6';
const TIMEOUT = 90000;
const store = {};
let activePrice = 0;
const MAX_CONCURRENT = 2;
const priceQueue = [];

const HAIKU_SYS = `Identify the item centered in the foreground. Ignore background entirely.
Return ONLY raw JSON:
{
  "item_name": "brand + type + model if visible. Use 'Brand unknown' if uncertain.",
  "description": "one sentence: what it is and primary use",
  "confident": true or false,
  "unknown_aspects": "what could not be confirmed e.g. brand, model — empty string if confident"
}
confident = false if brand or model is unconfirmed. confident = true only if both are clearly identifiable.`;

const PRICE_SYS = `You are a resale pricing analyst. Run a maximum of 3 web searches.
Return ONLY raw JSON starting with { and ending with }:
{
  "resale_analysis": "Best platform (eBay vs FB) and why, demand, saturation, buyer profile, red flags. 2-3 sentences, facts only.",
  "resale_estimate": "$XX–$XX",
  "retail_range": "$XX–$XX",
  "secondhand_range": "$XX–$XX"
}
Search 1: what this item retails for new.
Search 2: what this item sells for used on eBay and Facebook Marketplace.
Search 3: only if needed to fill gaps.`;

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function isUsableName(name) {
  if (!name) return false;
  const l = name.toLowerCase();
  return name.length > 4 && !l.startsWith('unknown item') && !l.includes('could not');
}

window.addEventListener('load', () => {
  const k = localStorage.getItem('apk');
  if (k) { document.getElementById('api-key').value = k; setKeyStatus('Key loaded.', true); }
});

function setKeyStatus(msg, ok) {
  const el = document.getElementById('key-status');
  el.textContent = msg; el.className = 'key-status' + (ok ? ' ok' : '');
}

function saveKey() {
  const k = document.getElementById('api-key').value.trim();
  if (!k.startsWith('sk-ant-')) { setKeyStatus('Should start with sk-ant-', false); return; }
  localStorage.setItem('apk', k); setKeyStatus('Key saved.', true);
}

function getKey() { return document.getElementById('api-key').value.trim(); }

function updateQueueBadge() {
  const n = Object.keys(store).length;
  document.getElementById('queue-badge').textContent = n ? n + ' item' + (n !== 1 ? 's' : '') : '';
}

function resetAll() {
  Object.keys(store).forEach(k => delete store[k]);
  priceQueue.length = 0;
  document.getElementById('queue').innerHTML = '';
  document.getElementById('queue-section').style.display = 'none';
  document.getElementById('upload-section').style.display = 'block';
  document.getElementById('fi').value = '';
  document.getElementById('fi-more').value = '';
  updateQueueBadge();
}

async function handleFiles(e) {
  const key = getKey();
  if (!key || !key.startsWith('sk-ant-')) { alert('Save your API key first.'); return; }
  const files = Array.from(e.target.files).slice(0, 20);
  if (!files.length) return;
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('queue-section').style.display = 'block';

  const reads = files.map(f => new Promise((res, rej) => {
    if (!VALID.includes(f.type)) { rej(new Error('Unsupported: ' + f.type)); return; }
    const r = new FileReader();
    r.onload = ev => res({ b64: ev.target.result.split(',')[1], mtype: f.type, src: ev.target.result });
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(f);
  }));

  const loaded = await Promise.allSettled(reads);
  const queueEl = document.getElementById('queue');

  loaded.forEach((result, i) => {
    const id = 'item-' + Date.now() + '-' + i;
    const card = document.createElement('div');
    card.className = 'item-card'; card.id = id;
    if (result.status === 'rejected') {
      card.innerHTML = `<div class="card-top"><div class="card-info"><div class="card-name" style="color:#f08080">Error</div><div class="card-desc">${esc(result.reason.message)}</div></div></div>`;
      queueEl.appendChild(card); return;
    }
    const { b64, mtype, src } = result.value;
    store[id] = { b64, mtype, src, extraImages: [], keywords: '', name: '', description: '', confident: false, unknownAspects: '' };
    card.innerHTML = `<div class="card-top">
      <img class="card-thumb" src="${esc(src)}" alt="item">
      <div class="card-info">
        <div class="card-name"><span class="spinner"></span>Identifying...</div>
        <div class="card-desc" style="color:#666;font-style:italic">Please wait</div>
      </div>
    </div><div class="card-body"></div>`;
    queueEl.appendChild(card);
    identifyItem(id, key);
  });

  e.target.value = '';
  updateQueueBadge();
}

async function fetchAPI(payload, key) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), TIMEOUT);
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(payload),
      signal: ctrl.signal
    });
    clearTimeout(t);
    if (!r.ok) {
      let eb = ''; try { const j = await r.json(); eb = j.error?.message || JSON.stringify(j); } catch {}
      throw new Error('API ' + r.status + ': ' + eb);
    }
    return await r.json();
  } catch(e) {
    clearTimeout(t);
    if (e.name === 'AbortError') throw new Error('Timed out. Try again.');
    throw e;
  }
}

function extractJSON(raw) {
  const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
  if (s === -1 || e === -1) throw new Error('No JSON in response');
  return raw.slice(s, e + 1);
}

function buildSearchLinks(name) {
  const q = encodeURIComponent(name);
  return {
    ebay: `https://www.ebay.com/sch/i.html?_nkw=${q}`,
    google: `https://www.google.com/search?q=${q}&tbm=shop`,
    fb: `https://www.facebook.com/marketplace/search/?query=${q}`
  };
}

function linkRowHTML(name) {
  if (!isUsableName(name)) return '';
  const l = buildSearchLinks(name);
  return `<div class="link-row">
    <a class="link-btn" href="${l.ebay}" target="_blank" rel="noopener">eBay</a>
    <a class="link-btn" href="${l.google}" target="_blank" rel="noopener">Google Shopping</a>
    <a class="link-btn" href="${l.fb}" target="_blank" rel="noopener">FB Marketplace</a>
  </div>`;
}

function renderCardIdentified(id) {
  const item = store[id];
  const card = document.getElementById(id);
  if (!card) return;

  card.querySelector('.card-info').innerHTML =
    `<div class="card-name">${esc(item.name)}</div><div class="card-desc">${esc(item.description)}</div>`;

  let h = '';
  if (!item.confident) {
    h += `<div class="flag">&#9888; Partial ID${item.unknownAspects ? ' — ' + esc(item.unknownAspects) : ''}</div>`;
    h += `<div class="reid-section">
      <div class="label">Help with identification</div>
      <input type="text" id="kw-${id}" placeholder="Brand, model, color, markings..." style="margin-bottom:8px" value="${esc(item.keywords)}">
      <div class="extra-imgs" id="extraImgs-${id}">
        ${item.extraImages.map(img=>`<img class="extra-thumb" src="${esc(img.src)}" alt="">`).join('')}
      </div>
      <input type="file" id="extraFi-${id}" accept="image/jpeg,image/png,image/webp,image/gif" multiple style="display:none" onchange="addExtraImages('${id}',event)">
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn sm" onclick="document.getElementById('extraFi-${id}').click()">+ Images</button>
        <button class="btn sm primary" onclick="reidentify('${id}')">Re-identify</button>
      </div>
    </div>`;
  }

  h += linkRowHTML(item.name);
  h += `<button class="btn primary" id="gp-${id}" onclick="queueGetPrices('${id}')">Get Prices</button>`;
  card.querySelector('.card-body').innerHTML = h;
}

async function identifyItem(id, key) {
  const item = store[id];
  const card = document.getElementById(id);
  try {
    const data = await fetchAPI({
      model: HAIKU, max_tokens: 200, system: HAIKU_SYS,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: item.mtype, data: item.b64 } },
        { type: 'text', text: 'Identify the foreground item. Return only JSON.' }
      ]}]
    }, key);

    const txt = (data.content||[]).filter(x=>x.type==='text').map(x=>x.text).join('');
    let d; try { d = JSON.parse(extractJSON(txt)); } catch { throw new Error('Parse failed'); }
    store[id].name = d.item_name || 'Unknown item';
    store[id].description = d.description || '';
    store[id].confident = !!d.confident;
    store[id].unknownAspects = d.unknown_aspects || '';
    renderCardIdentified(id);
  } catch(err) {
    card.querySelector('.card-info').innerHTML =
      `<div class="card-name" style="color:#f08080">Identification failed</div><div class="card-desc">${esc(err.message)}</div>`;
    card.querySelector('.card-body').innerHTML =
      `<button class="btn sm" style="margin-top:6px" onclick="retryIdentify('${id}')">Retry</button>`;
  }
}

function retryIdentify(id) {
  const card = document.getElementById(id);
  card.querySelector('.card-info').innerHTML =
    '<div class="card-name"><span class="spinner"></span>Identifying...</div><div class="card-desc" style="color:#666;font-style:italic">Please wait</div>';
  card.querySelector('.card-body').innerHTML = '';
  identifyItem(id, getKey());
}

async function addExtraImages(id, e) {
  const max = 3 - store[id].extraImages.length;
  const files = Array.from(e.target.files).slice(0, max).filter(f=>VALID.includes(f.type));
  const reads = files.map(f => new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = ev => res({ b64: ev.target.result.split(',')[1], mtype: f.type, src: ev.target.result });
    r.onerror = ()=>rej(); r.readAsDataURL(f);
  }));
  const results = await Promise.allSettled(reads);
  results.forEach(r => { if (r.status==='fulfilled') store[id].extraImages.push(r.value); });
  const c = document.getElementById('extraImgs-' + id);
  if (c) c.innerHTML = store[id].extraImages.map(img=>`<img class="extra-thumb" src="${esc(img.src)}" alt="">`).join('');
  e.target.value = '';
}

async function reidentify(id) {
  const item = store[id];
  const key = getKey();
  const card = document.getElementById(id);
  const kwInput = document.getElementById('kw-' + id);
  if (kwInput) store[id].keywords = kwInput.value.trim();
  card.querySelector('.card-info').innerHTML =
    '<div class="card-name"><span class="spinner"></span>Re-identifying...</div><div class="card-desc" style="color:#666;font-style:italic">Adding context...</div>';
  card.querySelector('.card-body').innerHTML = '';

  const content = [{ type: 'image', source: { type: 'base64', media_type: item.mtype, data: item.b64 } }];
  item.extraImages.forEach(img => content.push({ type: 'image', source: { type: 'base64', media_type: img.mtype, data: img.b64 } }));
  const kw = item.keywords ? `Additional context: "${item.keywords}". ` : '';
  content.push({ type: 'text', text: `${kw}Identify the foreground item in the first image. Return only JSON.` });

  try {
    const data = await fetchAPI({ model: HAIKU, max_tokens: 200, system: HAIKU_SYS, messages: [{ role: 'user', content }] }, key);
    const txt = (data.content||[]).filter(x=>x.type==='text').map(x=>x.text).join('');
    let d; try { d = JSON.parse(extractJSON(txt)); } catch { throw new Error('Parse failed'); }
    store[id].name = d.item_name || store[id].name;
    store[id].description = d.description || store[id].description;
    store[id].confident = !!d.confident;
    store[id].unknownAspects = d.unknown_aspects || '';
    renderCardIdentified(id);
  } catch(err) {
    card.querySelector('.card-info').innerHTML =
      `<div class="card-name" style="color:#f08080">Re-identification failed</div><div class="card-desc">${esc(err.message)}</div>`;
    card.querySelector('.card-body').innerHTML =
      `<button class="btn sm primary" style="margin-top:6px" onclick="reidentify('${id}')">Retry</button>`;
  }
}

function queueGetPrices(id) {
  const btn = document.getElementById('gp-' + id);
  if (btn) { btn.disabled = true; btn.textContent = activePrice >= MAX_CONCURRENT ? 'Queued...' : 'Searching...'; }
  priceQueue.push(id);
  processQueue();
}

function processQueue() {
  while (activePrice < MAX_CONCURRENT && priceQueue.length > 0) {
    const id = priceQueue.shift();
    const btn = document.getElementById('gp-' + id);
    if (btn) { btn.disabled = true; btn.textContent = 'Searching...'; }
    activePrice++;
    getPrices(id).finally(() => { activePrice--; processQueue(); });
  }
}

async function getPrices(id) {
  const item = store[id];
  const key = getKey();
  const card = document.getElementById(id);
  const body = card?.querySelector('.card-body');
  if (!body) return;

  try {
    const data = await fetchAPI({
      model: SONNET, max_tokens: 1200, system: PRICE_SYS,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: `Item: ${item.name}. Find current retail and secondhand prices. Return only the JSON.` }]
    }, key);

    const txt = (data.content||[]).filter(x=>x.type==='text').map(x=>x.text).join('');
    if (!txt) throw new Error('No text response. Try again.');
    let d; try { d = JSON.parse(extractJSON(txt)); } catch(pe) { throw new Error('Parse failed: ' + pe.message); }

    // Free memory — image no longer needed after pricing
    store[id].b64 = null;
    store[id].extraImages.forEach(img => img.b64 = null);

    renderPrices(body, d, id);
  } catch(err) {
    body.innerHTML = `<div class="err-inline">${esc(err.message)}</div>
      ${linkRowHTML(item.name)}
      <button class="btn sm primary" style="margin-top:8px" onclick="queueGetPrices('${id}')">Retry</button>`;
  }
}

function renderPrices(container, d, id) {
  const item = store[id] || {};
  if (d.error) { container.innerHTML = '<div class="err-inline">' + esc(d.error) + '</div>'; return; }
  let h = '<div class="prices-grid">';
  h += `<div class="price-box"><div class="price-box-label">Retail</div><div class="price-val" data-field="retail">${esc(d.retail_range||'—')}</div></div>`;
  h += `<div class="price-box"><div class="price-box-label">Secondhand</div><div class="price-val" data-field="secondhand">${esc(d.secondhand_range||'—')}</div></div>`;
  h += '</div>';
  h += `<div class="price-box" style="margin-bottom:8px"><div class="price-box-label">Resale Estimate</div><div class="resale-num" data-field="estimate">${esc(d.resale_estimate||'—')}</div></div>`;
  h += `<div class="label">Resale Analysis</div><div class="box" data-field="analysis">${esc(d.resale_analysis||'—')}</div>`;
  h += linkRowHTML(item.name);
  h += `<button class="btn success sm" style="margin-top:10px;width:100%" onclick="exportCard('${id}')">&#128203; Copy Summary</button>`;
  container.innerHTML = h;
}

function exportCard(id) {
  const item = store[id] || {};
  const card = document.getElementById(id);
  const get = field => card?.querySelector(`[data-field="${field}"]`)?.textContent || '—';
  const text = [
    item.name || 'Unknown item',
    item.description || '',
    '',
    'Retail:      ' + get('retail'),
    'Secondhand:  ' + get('secondhand'),
    'Resale Est:  ' + get('estimate'),
    '',
    'Analysis: ' + get('analysis')
  ].join('\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = card?.querySelector('.btn.success');
    if (btn) { btn.textContent = '✓ Copied'; setTimeout(() => btn.innerHTML = '&#128203; Copy Summary', 2000); }
  }).catch(() => prompt('Copy this summary:', text));
}
</script>
</body>
</html>
